<div class="row">
  <div class=" col-12">
    <div class="cms-wrapper">         
            
            <div class="custom-accordian">
                <div class="accordion" id="accordionExample">
          


                    <div class="accordion-item" *ngFor="let faq of FaqList;let i=index;">
                      <h2 class="accordion-header" [id]="'headingTwo'+i">
                        <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" [attr.data-bs-target]="'#collapseTwo'+i" aria-expanded="false" [attr.aria-controls]="'collapseTwo'+i">
                            {{i+1}}. {{faq?.question}}
                        </button>
                      </h2>
                      <div [id]="'collapseTwo'+i" class="accordion-collapse collapse" aria-labelledby="headingTwo" data-bs-parent="#accordionExample">
                        <div class="accordion-body">
                          {{faq?.answer}}
                        </div>
                      </div>
                    </div>
                      




                  </div>
            </div>


        </div>
    </div>
</div>
