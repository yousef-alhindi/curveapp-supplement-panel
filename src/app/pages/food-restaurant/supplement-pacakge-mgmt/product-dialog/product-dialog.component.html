<div class="dialog-wrapper">
    <div mat-dialog-title>
        <span class="dialog-heading">Product</span>
        <i mat-dialog-close class="bi bi-x-circle-fill primary-color"></i>
    </div>
    <mat-dialog-content class="mat-typography">

        <div class="row">
            <div class="col-12">
              <div class="payment-radio d-flex justify-content-between">
                <mat-radio-group [(ngModel)]="selectedStockId" aria-label="Select an option">
                  <mat-radio-button *ngFor="let item of data.stock" [value]="item._id">
                    {{ item.size }}Kg ({{ item.mrp }}KWD)
                  </mat-radio-button>
                </mat-radio-group>
              </div>
              <button class="mt-3 w-100" color="primary" mat-flat-button (click)="submit()">Submit</button>
            </div>
          </div>
          
    </mat-dialog-content>
    
</div>
