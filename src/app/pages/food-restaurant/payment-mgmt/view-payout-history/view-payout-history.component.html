<div class="row align-items-center">

            <i class="bi bi-search"></i>

    <div class="row">
        <div class="col-lg-3">
            <div class="card-header">
                <div>
                    <h4 class="card-title">
                        <i class="bi bi-arrow-left-short" routerLink="/supplement/payment-mgmt/"></i>
                        <span> Payout History </span>
                    </h4>
                </div>
            </div>
        </div>
        <div class="col-lg-9 my-2">
            <form [formGroup]="dateForm">
                <div class="row">
                    
    
                    <div class="col-lg-3 my-2">
    
    
                        <div class="custom-date d-flex align-items-center gap-2">
                            <label class="date-label">From</label>
    
                            <mat-form-field appearance="outline" class="w-100">
                                <input matInput placeholder="DD/MM/YYYY" [matDatepicker]="picker"
                                    formControlName="fromDate">
                                <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
                                <mat-datepicker #picker></mat-datepicker>
                            </mat-form-field>
                        </div>
    
                    </div>
    
                    <div class="col-lg-3 my-2 ">
                        <div class="custom-date d-flex align-items-center gap-2">
                            <label class="date-label">To</label>
                            <mat-form-field appearance="outline" class="w-100">
                                <input matInput placeholder="DD/MM/YYYY" [matDatepicker]="picker1" formControlName="toDate">
                                <mat-datepicker-toggle matIconSuffix [for]="picker1"></mat-datepicker-toggle>
                                <mat-datepicker #picker1></mat-datepicker>
                            </mat-form-field>
                        </div>
                    </div>
                    <div class="col-lg-3 my-2">
                        <button color="primary" mat-flat-button class="w-100" (click)="onDateFilter()">Apply</button>
                
                    </div>
                
                    <div class=" col-lg-3 col-xl-3 col-xxl-3 text-end ms-auto my-2">
                        <button color="primary" mat-flat-button class="w-100">Export Report</button>
                
                    </div>
    
    
                </div>
            </form>
        </div>
    </div>




    <div class="col-12 mt-4">

        <div class="table-responsive">
            <table mat-table [dataSource]="dataSource1" class="w-100">
                <ng-container matColumnDef="s_no">
                    <th mat-header-cell *matHeaderCellDef>S.No.</th>
                    <td mat-cell *matCellDef="let element; let i = index;">
                        {{i + 1}}
                    </td>
                </ng-container>

                <ng-container matColumnDef="paid">
                    <th mat-header-cell *matHeaderCellDef>Paid On</th>
                    <td mat-cell *matCellDef="let element">
                        {{ element?.createdAt | date:'dd/MM/yyyy hh:mm a':'UTC'}}
                    </td>
                </ng-container>

                <ng-container matColumnDef="date_from">
                    <th mat-header-cell *matHeaderCellDef>Date (From)</th>
                    <td mat-cell *matCellDef="let element">
                        {{ element?.fromDate | date:'dd/MM/yyyy hh:mm a':'UTC'}}
                    </td>
                </ng-container>

                <ng-container matColumnDef="date_to">
                    <th mat-header-cell *matHeaderCellDef>Date (To)</th>
                    <td mat-cell *matCellDef="let element">
                        {{ element?.toDate | date:'dd/MM/yyyy hh:mm a':'UTC'}}
                    </td>
                </ng-container>

                <ng-container matColumnDef="amount">
                    <th mat-header-cell *matHeaderCellDef>Amount </th>
                    <td mat-cell *matCellDef="let element">
                        {{ element?.amount}}
                    </td>
                </ng-container>

                <tr mat-header-row *matHeaderRowDef="displayedColumns1; sticky: true"></tr>

                <tr mat-row *matRowDef="let row; columns: displayedColumns1"></tr>
            </table>
        </div>
        <mat-paginator
        #MatPaginator1
        [pageSizeOptions]="[5, 10, 15]"
        showFirstLastButtons
        [length]="totalLength"
        (page)="onPageChange($event)"
        aria-label="Select page of periodic elements"
      >
      </mat-paginator>
    </div>









</div>
