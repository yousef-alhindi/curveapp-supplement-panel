<div class="row align-items-center">
    <div class="col-md-6 col-lg-5 col-xl-3 col-xxl-3 mb-3">
        <div class="search-input">
            <input type="text"  [(ngModel)]="searchKey"class="form-control" (keyup)="applyFilter($event)" placeholder="Search...">
            <i class="bi bi-search"></i>
        </div>
    </div>


    <div class="col-md-6 col-lg-3 col-xl-2 col-xxl-2 mb-3">
        <div class="custom-select">
            <select name="gender" id="genderSelect" class="form-select" (change)="filterData()">
                <label for="gender">Gender:</label>
                <option value="Veg" hidden>All</option>
                <option value="1">Veg</option>
                <option value="2"> Non-Veg</option>
                <option value="3"> All</option>
            </select>
        </div>
    </div>




    <div class="col-md-12 col-lg-4 col-xl-7 col-xxl-7 text-md-end mb-3">
        <button  (click)="addDialog('500ms', '500ms','2',{itemType:itemType})" color="primary" mat-flat-button class="w-260"> <img src="assets/images/create_new.png" class="me-1"
                alt="create" height="20px"> ADD ITEM</button>
    </div>



    <div class="col-12 mt-4">


        <div class="table-responsive">
            <table      mat-table [dataSource]="dataSource1" class="w-100">
                <ng-container matColumnDef="s_no">
                    <th mat-header-cell *matHeaderCellDef>Sr.No.</th>
                    <td mat-cell *matCellDef="let element; let i = index;">
                        {{i + 1}}
                    </td>
                </ng-container>

                <ng-container matColumnDef="item">
                    <th mat-header-cell *matHeaderCellDef>Item Name</th>
                    <td mat-cell *matCellDef="let element">
                        {{ element?.name }}
                    </td>
                </ng-container>

                <ng-container matColumnDef="price">
                    <th mat-header-cell *matHeaderCellDef>Price </th>
                    <td mat-cell *matCellDef="let element">
                        KD {{ element?.price}}
                    </td>
                </ng-container>

                <ng-container matColumnDef="img">
                    <th mat-header-cell *matHeaderCellDef>Image</th>
                    <td mat-cell *matCellDef="let element">
                        <div class="img-text">
                            <img [src]="  element?.image" alt="food" width="40px" height="40px" class="rounded"
                            >
                            <span class="view" 
                            (click)="openImageDialog(element)">View</span>
                        </div>
                    </td>
                </ng-container>

                <ng-container matColumnDef="description">
                    <th mat-header-cell *matHeaderCellDef>Description </th>
                    <td mat-cell *matCellDef="let element">
                        <button (click)="descriptionDialog('500ms','500ms',element)"  class="btn btn-outline-success btn-sm">View</button>
                    </td>
                </ng-container>

                <ng-container matColumnDef="customize">
                    <th mat-header-cell *matHeaderCellDef>Customize Items </th>
                    <td mat-cell *matCellDef="let element">
                        <!-- (click)="redirectToCustomizeItem(element._id) -->
                        <span class="primary-color" (click)="redirectToCustomizeItem(element)" >
                            {{ element?.totalItems}} Items
                        </span>
                    </td>
                </ng-container>

                <ng-container matColumnDef="type">
                    <th mat-header-cell *matHeaderCellDef>Item Type </th>
                    <td mat-cell *matCellDef="let element" [class]="element.itemType==1? 'text-success':'text-danger'">
                        {{ element?.itemType == 1 ?'Veg': element?.itemType == 2 ?'Non Veg' :'All'}}
                    </td>
                </ng-container>




                <ng-container matColumnDef="action">
                    <th class="text-center"  mat-header-cell *matHeaderCellDef>
                        Action
                    </th>
                    <td mat-cell *matCellDef="let element">
                        <div class="action-icon d-flex justify-content-center gap-4 align-items-center">
                            <span class="action-head">
                                <mat-slide-toggle matTooltip="Enable/Disable"
                                (change)="enableDisableadvertisement(element._id, $event)"
                                [checked]="element?.status == true"></mat-slide-toggle>
                            </span>

                            <span class="action-head">
                                <mat-icon (click)="openEditDialog('500ms', '500ms', 2, element)" matTooltip="Edit" class="text-success">
                                    <img src="assets/images/edit_xxs.png" alt="edit">
                                </mat-icon>
                            </span>

                            <span class="action-head">
                                <mat-icon matTooltip="Delete" class="text-danger">
                                    <img src="assets/images/delete_list.png" alt="delete"   (click)="deleteDialog('500ms', '500ms',element)">
                                </mat-icon>
                            </span>



                        </div>

                    </td>
                </ng-container>


                <tr mat-header-row *matHeaderRowDef="displayedColumns1; sticky: true"></tr>

                <tr mat-row *matRowDef="let row; columns: displayedColumns1"></tr>
            </table>
            <table class="text-center mt-4 " *ngIf="dataSource1.data.length < 1 ">
                <div class="no-data">
                    <h5>No Data Available</h5>
                </div>
            </table>
            <table class="text-center mt-4 " *ngIf=" dataSource1.filteredData.length < 1 && dataSource1.data.length>0">
                <div class="no-data">
                    <h5>No Search Result Found</h5>
                </div>
            </table>

        </div>
        <mat-paginator #MatPaginator1="matPaginator" [pageSizeOptions]="[15, 30, 45]">
        </mat-paginator>

    </div>









</div>
