    <div class="col-md-6 col-lg-4 col-xl-3 ms-lg-auto mb-3">
        <button color="primary" (click)="addDialog('500ms', '500ms', '1','')" mat-flat-button class="w-100"> <img
                src="assets/images/create_new.png" class="me-1" alt="create" height="20px"> ADD CATEGORY</button>

    </div>



    <div class="col-12 mt-4">
        <div class="table-responsive">
            <table mat-table [dataSource]="dataSource1" class="w-100">
                <ng-container matColumnDef="s_no">
                    <th mat-header-cell *matHeaderCellDef>Sr.No.</th>
                    <td mat-cell *matCellDef="let element; let i = index;">
                        {{i + 1}}
                    </td>
                </ng-container>

                <ng-container matColumnDef="category">
                    <th mat-header-cell *matHeaderCellDef>Category Name</th>
                    <td mat-cell *matCellDef="let element">
                        {{ element?.resCategory }}
                    </td>
                </ng-container>

                <ng-container matColumnDef="created">
                    <th mat-header-cell *matHeaderCellDef>Created On </th>
                    <td mat-cell *matCellDef="let element">
                        <!-- {{ element?.createdAt|date}} -->
                        {{ element?.createdAt | date :'MM/dd/yyyy'}} | {{ element?.createdAt | date :'h:mm a'}}
                    </td>
                </ng-container>

                <ng-container matColumnDef="items">
                    <th mat-header-cell *matHeaderCellDef>Total Items</th>
                    <td mat-cell *matCellDef="let element" (click)="gotoSubcategory(element)">
                        <span class="primary-color">
                            {{ element?.totalMenuItems}} Items
                        </span>

                    </td>
                </ng-container>
                <ng-container matColumnDef="action">
                    <th mat-header-cell *matHeaderCellDef>
                            Action

                    </th>
                    <td mat-cell *matCellDef="let element">
                        <div class="action-icon d-flex justify-content-start gap-4 align-items-center">
                            <span class="action-head">
                                <mat-icon matTooltip="Edit" class="text-success"
                                    (click)="addDialog('500ms', '500ms', '1' ,element)">
                                    <img src="assets/images/edit_xxs.png" alt="edit">
                                </mat-icon>
                            </span>
                            <span class="action-head">
                                <mat-icon matTooltip="Delete" class="text-danger"
                                    (click)="deleteDialog('500ms', '500ms',element)">
                                    <img src="assets/images/delete_list.png" alt="delete">
                                </mat-icon>
                            </span>



                        </div>

                    </td>
                </ng-container>


                <tr mat-header-row *matHeaderRowDef="displayedColumns1; sticky: true"></tr>

                <tr mat-row *matRowDef="let row; columns: displayedColumns1"></tr>
            </table>
            <table class="text-center mt-4 " *ngIf="dataSource1.data.length < 1 ">
                <div class="no-data">
                    <h5>No Data Available</h5>
                </div>
            </table>
            <table class="text-center mt-4 " *ngIf=" dataSource1.filteredData.length < 1 && dataSource1.data.length>0">
                <div class="no-data">
                    <h5>No Search Result Found</h5>
                </div>
            </table>
        </div>

        <mat-paginator #MatPaginator1="matPaginator" [pageSizeOptions]="[15, 30, 45]">
        </mat-paginator>

    </div>









</div>
