<div class="dialog-wrapper">
  <div mat-dialog-title>
    <span class="dialog-heading">{{data?.cusomizeItemData ? 'Edit' : 'Add'}} Customize Item Details</span>
    <i mat-dialog-close class="bi bi-x-circle-fill primary-color"></i>
  </div>
  <mat-dialog-content class="mat-typography">
    <form [formGroup]="AddcostomiseForm">
      <div class="row my-3">
        <div class="col-12">
          <div class="custom-form-input mb-4">
            <label class="dialog-label mb-2">Item Name</label>
            <mat-form-field appearance="outline" class="w-100">
              <input matInput formControlName="name" placeholder="Type Here"
                onkeypress="return event.target.selectionStart === 0 ? event.key !== ' ' : true;" />
            </mat-form-field>
            <div *ngIf="submitted && f['name'].errors" class="text-danger">
              <div *ngIf="f['name'].errors['required']">
                Item Name is required
              </div>
            </div>
          </div>

          <div class="custom-form-input mb-4">
            <label class="dialog-label mb-2">Price</label>
            <mat-form-field appearance="outline" class="w-100">
              <input matInput type="number" formControlName="price" placeholder="KD" />
            </mat-form-field>
            <div *ngIf="submitted && f['price'].errors" class="text-danger">
              <div *ngIf="f['price'].errors['required']">Price is required</div>
            </div>
          </div>

          <div class="text-center">
            <button mat-flat-button color="primary" class="w-260" (click)="Addcategory()">
              SAVE
            </button>
          </div>
        </div>
      </div>
    </form>
  </mat-dialog-content>
</div>
