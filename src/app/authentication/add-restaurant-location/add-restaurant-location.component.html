
<div class="container">
  <div class="top-logo">
    <img src="assets/images/curve_logo.png" alt="logo" />
  </div>
</div>

<div
  class="auth-panel"
  style="background-image: url('assets/images/bg.png')"
>
  <div class="container">
   

    <div class="row align-items-center justify-content-center">
      <div class="col-md-9">
        <div class="login-card-profile ms-md-auto">
          <div class="back-btn" routerLink="/create-business-profile">
            <i class="bi bi-chevron-left"></i>
          </div>

          <div class="log-top-txt">
            <div class="text-center">
              <h4 class="mt-3">Add Store Location</h4>
              <h3>Address Details</h3>

              <p>
                Provide accurate details to ensure timely delivery of food to
                your customers
              </p>
            </div>
          </div>

          <form [formGroup]="RestaurantAddressForm">
            <div class="row business-row">
              <div class="col-md-6">
                
                <div class="custom-input mb-4 me-3">
                  <label class="auth-label">Address</label>
                  <mat-form-field
                    appearance="outline"
                    (click)="locationDialog()"
                    class="w-100"
                  >
                    <input
                      matInput
                      readonly
                      placeholder="Address"
                      [(ngModel)]="getAddress"
                      formControlName="address"
                      
                    />
                    <mat-icon matSuffix class="primary-color pointer"
                      >near_me</mat-icon
                    >
                  </mat-form-field>
                  <div
                  *ngIf="commonFunctionForError('address')"
                  class="text-danger"
                >
                   *Address is required
                </div>
                </div>
              </div>

              <div class="col-md-6">
                
                <div class="custom-input mb-4 ms-3">
                  <label class="auth-label">Shop no / Street</label>
                  <mat-form-field appearance="outline" class="w-100">
                    <input
                      matInput
                      placeholder="Shop no / Street"
                      formControlName="street"
                      onkeypress="return event.target.selectionStart === 0 ? event.key !== ' ' : true;" 

                    />
                  </mat-form-field>
                  <div
                    *ngIf="commonFunctionForError('street')"
                    class="text-danger"
                  >
                    Street is required
                  </div>
                </div>
              </div>

              <div class="col-md-6">
                
                <div class="custom-input me-3 mb-4">
                  <label class="auth-label">Building/Floor</label>
                  <mat-form-field appearance="outline" class="w-100">
                    <input
                      matInput
                      placeholder="Building/Floor"
                      [(ngModel)]="getZipCode"                      
                      onkeypress="return event.target.selectionStart === 0 ? event.key !== ' ' : true;" 
                    formControlName="postalCode"

                    />
                  </mat-form-field>
                  <div
                    *ngIf="commonFunctionForError('postalCode')"
                    class="text-danger"
                  >
                     *Block is required
                  </div>
                </div>
              </div>

              <div class="col-md-6">
                
                <div class="custom-input ms-3 mb-4">
                 




                  <label class="auth-label">Postal Code</label>
                  <mat-form-field appearance="outline" class="w-100">
                    <input
                      matInput
                      placeholder="Postal Code (Optional)"
                      formControlName="building"
                      onkeypress="return event.target.selectionStart === 0 ? event.key !== ' ' : true;" 

                    />
                  </mat-form-field>
                  <div
                    *ngIf="commonFunctionForError('building')"
                    class="text-danger"
                  >
                  Building/Floor is required
                  </div>
                </div>
              </div>

              <div class="col-md-6">
                <div class="me-3">

                <label class="auth-label">Upload Shop Logo File</label>
                <div class="custom-img-input">
                  <div class="upload_image">
                    <img
                      [src]="
                        url
                          ? url
                          : 'https://www.w3schools.com/howto/img_avatar.png'
                      "
                    />
                    <label class="hoverable" for="fileInput">
                      <div class="hover-text">
                        <img
                          src="assets/images/upload_small.png"
                          alt="upload"
                        />
                      </div>
                    </label>
                    <br />
                    <input
                      id="fileInput"
                      type="file"  accept=".png, .jpg, .jpeg"
                      (change)="onSelectFile($event)"
                      
                    />
                  </div>
                </div>
                </div>

                <!-- <mat-error class="error" *ngIf="submitted && url == undefined">*Restaurant Logo is required
              </mat-error>  -->
              <div
                    *ngIf="submitted  && !profileImage"
                    class="text-danger"
                  >
                   *Restaurant Logo is required
                  </div>
              </div>
            </div>
          </form>
          <div class="auth-btn text-center mt-5 mb-2">
            <button
              mat-flat-button
              class="w-50"
              color="primary"
              (click)="addResturantAddress()"
            >
              Continue
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
