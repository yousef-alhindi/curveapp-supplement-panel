<div class="custom-dialog notification-dialog ">

    <h2 mat-dialog-title>
        <span class="dialog-heading">Use my current location</span>
        <i mat-dialog-close  class="bi bi-x-lg primary-color"></i>
    </h2>
    <mat-dialog-content class="">
        <!-- <div class="mark-read">
            Mark all as read
        </div> -->
        <!-- <div>
            <input type="text"  class="form-control" placeholder="Search for location" #search>
          </div> -->


          <div class="custom-input mb-4">
            <mat-form-field appearance="outline" class="w-100">
              <input
                matInput
                placeholder="Search for location" #search  />
            </mat-form-field>
        


          </div>


        <div class="location-map" style="position: relative;width: 100%; height: 300px;" >
            <agm-map  [streetViewControl]="false"   style="width: 100%; height: 300px;position: absolute;" [zoom]="15"  [latitude]="latitude" [longitude]="longitude" >
                <agm-marker  [latitude]="latitude" [longitude]="longitude" [markerDraggable]="true" (dragEnd)="markerDragEnd($event)"></agm-marker>
            </agm-map>
            <!-- <button class="location-btn" color="primary" mat-flat-button (click)="setCurrentLocation()">  Locate Me</button> -->
            <div class="locn">
                <i (click)="setCurrentLocation()" class="bi bi-crosshair"></i>
             </div>

        </div>
       

        <div class="location-content">

            <div class="custom-flex gap-2 align-items-start">
                <div>
                    <mat-icon class="primary-color"> location_on</mat-icon>
                </div>
    
    
                <div>
                    <!-- <h5>C Block</h5> -->
                    <p>{{address}}</p>
                        
                </div>
            </div>

            <button mat-dialog-close color="primary" mat-flat-button class="w-100 mt-4" (click)="sendDataToParent()">Confirm Location</button>

        </div>






    </mat-dialog-content>
</div>
